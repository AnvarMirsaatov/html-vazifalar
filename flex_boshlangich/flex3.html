<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Master</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e5e5e5;
            padding: 30px;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
        }

        .title {
            font-size: 40px;
            margin: 50px 0;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }

        .logo {
            width: 180px;
            height: 70px;
            background-color: darkred;
            color: white;
            font-size: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu {
            display: flex;
            gap: 15px;
        }

        .menu-item {
            width: 100px;
            height: 50px;
            background-color: crimson;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* HERO */

        .hero {
            margin-bottom: 80px;
        }

        .hero img {
            width: 1200px;
            height: 500px;
            border-radius: 10px;
        }

        /* FEATURES */

        .features {
            display: flex;
            justify-content: space-between;
            margin-bottom: 80px;
        }

        .feature {
            width: 270px;
            height: 180px;
            background-color: firebrick;
            color: white;
            font-size: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* VIDEO */

        .video-section {
            margin-bottom: 80px;
        }

        video {
            width: 1200px;
            height: 500px;
            border-radius: 10px;
        }

        /* GALLERY */

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 80px;
        }

        .gallery img {
            width: 386px;
            height: 250px;
            border-radius: 10px;
        }

        /* BLOG */

        .blogs {
            margin-bottom: 80px;
        }

        .blog {
            width: 1200px;
            height: 180px;
            background-color: brown;
            color: white;
            font-size: 35px;

            display: flex;
            justify-content: center;
            align-items: center;

            margin-bottom: 20px;
        }

        /* TEAM */

        .team {
            display: flex;
            justify-content: space-between;
            margin-bottom: 80px;
        }

        .member {
            width: 350px;
            height: 420px;
            background-color: tomato;
            border-radius: 10px;
            padding: 15px;
        }

        .member img {
            width: 320px;
            height: 250px;
            border-radius: 10px;
        }

        .member h2 {
            margin-top: 20px;
            font-size: 28px;
        }

        .member p {
            margin-top: 15px;
            font-size: 20px;
        }

        /* FOOTER */

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-menu {
            display: flex;
            gap: 15px;
        }

        .footer-item {
            width: 100px;
            height: 50px;
            background-color: darkred;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <div class="header">

            <div class="logo">
                LOGO
            </div>

            <div class="menu">

                <div class="menu-item">HOME</div>
                <div class="menu-item">ABOUT</div>
                <div class="menu-item">SERVICE</div>
                <div class="menu-item">CONTACT</div>
                <div class="menu-item">LOGIN</div>

            </div>

        </div>

        <!-- HERO -->

        <h1 class="title">HERO SECTION</h1>

        <div class="hero">
            <img src="https://picsum.photos/1200/500" alt="">
        </div>

        <!-- FEATURES -->

        <h1 class="title">FEATURES</h1>

        <div class="features">

            <div class="feature">BOX 1</div>
            <div class="feature">BOX 2</div>
            <div class="feature">BOX 3</div>
            <div class="feature">BOX 4</div>

        </div>

        <!-- VIDEO -->

        <h1 class="title">VIDEO</h1>

        <div class="video-section">

            <video controls>
                <source src="movie.mp4" type="video/mp4">
            </video>

        </div>

        <!-- GALLERY -->

        <h1 class="title">GALLERY</h1>

        <div class="gallery">

            <img src="https://picsum.photos/400/250?1" alt="">
            <img src="https://picsum.photos/400/250?2" alt="">
            <img src="https://picsum.photos/400/250?3" alt="">
            <img src="https://picsum.photos/400/250?4" alt="">
            <img src="https://picsum.photos/400/250?5" alt="">
            <img src="https://picsum.photos/400/250?6" alt="">

        </div>

        <!-- BLOG -->

        <h1 class="title">BLOGS</h1>

        <div class="blogs">

            <div class="blog">BLOG CARD 1</div>
            <div class="blog">BLOG CARD 2</div>
            <div class="blog">BLOG CARD 3</div>

        </div>

        <!-- TEAM -->

        <h1 class="title">OUR TEAM</h1>

        <div class="team">

            <div class="member">

                <img src="https://picsum.photos/320/250?7" alt="">

                <h2>Ali Valiyev</h2>

                <p>Frontend Developer</p>

            </div>

            <div class="member">

                <img src="https://picsum.photos/320/250?8" alt="">

                <h2>Jasur Karimov</h2>

                <p>UI/UX Designer</p>

            </div>

            <div class="member">

                <img src="https://picsum.photos/320/250?9" alt="">

                <h2>Sardor Xasanov</h2>

                <p>Backend Developer</p>

            </div>

        </div>

        <!-- FOOTER -->

        <div class="footer">

            <div class="logo">
                LOGO
            </div>

            <div class="footer-menu">

                <div class="footer-item">INFO</div>
                <div class="footer-item">HELP</div>
                <div class="footer-item">BLOG</div>
                <div class="footer-item">CALL</div>

            </div>

        </div>

    </div>

</body>

</html>
