<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Challenge</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ececec;
            padding: 40px;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
        }

        /* HEADER */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 80px;
        }

        .logo {
            width: 180px;
            height: 70px;
            background-color: darkred;
            color: white;
            font-size: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .navbar {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            width: 100px;
            height: 50px;
            background-color: crimson;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TITLE */

        .title {
            text-align: center;
            font-size: 45px;
            margin-bottom: 50px;
        }

        /* HERO */

        .hero {
            display: flex;
            justify-content: space-between;
            gap: 30px;

            margin-bottom: 100px;
        }

        .hero-left {
            width: 750px;
            height: 400px;
            background-color: firebrick;
            color: white;
            font-size: 50px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-right {
            width: 340px;

            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .small-card {
            width: 160px;
            height: 190px;
            background-color: tomato;
            color: white;
            font-size: 25px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SECTION 2 */

        .section-2 {
            display: flex;
            justify-content: space-between;
            gap: 20px;

            margin-bottom: 100px;
        }

        .card {
            width: 350px;
            height: 300px;
            background-color: brown;
            color: white;
            font-size: 35px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SECTION 3 */

        .section-3 {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;

            margin-bottom: 100px;
        }

        .box {
            width: 260px;
            height: 220px;
            background-color: crimson;
            color: white;
            font-size: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SECTION 4 */

        .section-4 {
            display: flex;
            justify-content: space-between;
            gap: 30px;

            margin-bottom: 100px;
        }

        .left-side {
            width: 780px;

            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .left-box {
            width: 380px;
            height: 180px;
            background-color: darkred;
            color: white;
            font-size: 28px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .right-side {
            width: 300px;
            height: 380px;
            background-color: tomato;
            color: white;
            font-size: 40px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FOOTER */

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-menu {
            display: flex;
            gap: 20px;
        }

        .footer-item {
            width: 100px;
            height: 50px;
            background-color: firebrick;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <div class="header">

            <div class="logo">
                LOGO
            </div>

            <div class="navbar">

                <div class="nav-item">
                    Home
                </div>

                <div class="nav-item">
                    About
                </div>

                <div class="nav-item">
                    Shop
                </div>

                <div class="nav-item">
                    Blog
                </div>

            </div>

        </div>

        <!-- HERO -->

        <h1 class="title">
            HERO SECTION
        </h1>

        <div class="hero">

            <div class="hero-left">
                BIG CARD
            </div>

            <div class="hero-right">

                <div class="small-card">
                    BOX 1
                </div>

                <div class="small-card">
                    BOX 2
                </div>

                <div class="small-card">
                    BOX 3
                </div>

                <div class="small-card">
                    BOX 4
                </div>

            </div>

        </div>

        <!-- SECTION 2 -->

        <h1 class="title">
            CARDS
        </h1>

        <div class="section-2">

            <div class="card">
                CARD 1
            </div>

            <div class="card">
                CARD 2
            </div>

            <div class="card">
                CARD 3
            </div>

        </div>

        <!-- SECTION 3 -->

        <h1 class="title">
            GALLERY
        </h1>

        <div class="section-3">

            <div class="box">
                IMAGE 1
            </div>

            <div class="box">
                IMAGE 2
            </div>

            <div class="box">
                IMAGE 3
            </div>

            <div class="box">
                IMAGE 4
            </div>

            <div class="box">
                IMAGE 5
            </div>

            <div class="box">
                IMAGE 6
            </div>

        </div>

        <!-- SECTION 4 -->

        <h1 class="title">
            CONTENT
        </h1>

        <div class="section-4">

            <div class="left-side">

                <div class="left-box">
                    CONTENT 1
                </div>

                <div class="left-box">
                    CONTENT 2
                </div>

                <div class="left-box">
                    CONTENT 3
                </div>

                <div class="left-box">
                    CONTENT 4
                </div>

            </div>

            <div class="right-side">
                SIDEBAR
            </div>

        </div>

        <!-- FOOTER -->

        <div class="footer">

            <div class="logo">
                LOGO
            </div>

            <div class="footer-menu">

                <div class="footer-item">
                    Info
                </div>

                <div class="footer-item">
                    Help
                </div>

                <div class="footer-item">
                    Blog
                </div>

                <div class="footer-item">
                    Call
                </div>

            </div>

        </div>

    </div>

</body>

</html>
