<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Vazifasi</title>

    <style>

        body{
            text-align: center;
            background-color: #f5f5f5;
        }

        h1{
            color: red;
            margin-top: 30px;
        }

        .circle{
            width: 300px;
            height: 300px;
            background-color: red;

            border: 5px solid black;
            border-radius: 49%;

            margin: 50px auto;
        }

        p{
            width: 300px;

            font-weight: 600;
            color: rgb(226, 21, 21);
            text-transform: capitalize;

            margin: 50px auto;

            padding: 20px 30px 40px 50px;

            border: 1px solid black;

            background-color: white;
        }

    </style>
</head>
<body>

    <h1>CSS Vazifasi</h1>

    <div class="circle"></div>

    <p>
        bu matn css yordamida bezatilgan matnli blokdir.
        unda width, border, padding, margin va boshqa
        css xossalari qo‘llanilgan.
    </p>

</body>
</html>
