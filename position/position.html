<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#202124;
}

section{
    width:100%;
    min-height:100vh;
    padding:40px;
}

h1{
    width:500px;
    margin:auto;
    background:white;
    border-radius:40px;
    text-align:center;
    padding:20px;
}

.container{
    width:1400px;
    margin:80px auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:80px;
}

.box{
    width:250px;
    height:220px;
    background:#27ae60;
    color:white;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

.abs{
    width:150px;
    height:80px;
    background:#e74c3c;
    display:flex;
    justify-content:center;
    align-items:center;
    position:absolute;
}

/* 1 */
.abs1{
    top:-40px;
    right:-40px;
}

/* 2 */
.abs2{
    top:-40px;
    left:-40px;
}

/* 3 */
.abs3{
    bottom:-40px;
    right:-40px;
}

/* 4 */
.abs4{
    bottom:-40px;
    left:-40px;
}

/* 5 */
.abs5{
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* 6 */

.circle{
    width:120px;
    height:120px;
    background:red;
    border-radius:50%;
    position:absolute;
    bottom:-60px;
    right:-60px;
}

/* 7 */

.badge{
    width:70px;
    height:70px;
    border-radius:50%;
    background:red;
    position:absolute;
    top:-20px;
    right:-20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

/* 8 */

.ribbon{
    width:220px;
    background:red;
    position:absolute;
    top:20px;
    left:-55px;
    text-align:center;
    padding:10px;
}

/* 9 */

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:red;
    position:absolute;
    bottom:-55px;
    left:50%;
    transform:translateX(-50%);
}

/* 10 */

.button{
    width:70px;
    height:70px;
    border-radius:50%;
    background:red;
    position:absolute;
    bottom:-30px;
    right:-30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
}

/* 11 */

.shadow{
    width:180px;
    height:150px;
    background:red;
    position:absolute;
    top:35px;
    left:35px;
}

.card{
    width:180px;
    height:150px;
    background:white;
    color:black;
    position:absolute;
    top:15px;
    left:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2;
}

/* 12 */

.one{
    width:120px;
    height:120px;
    background:red;
    position:absolute;
    top:20px;
    left:20px;
    z-index:1;
}

.two{
    width:120px;
    height:120px;
    background:blue;
    position:absolute;
    top:50px;
    left:50px;
    z-index:2;
}

.three{
    width:120px;
    height:120px;
    background:yellow;
    position:absolute;
    top:80px;
    left:80px;
    z-index:3;
}
    </style>

<section>

<h1>POSITION PRACTICE</h1>

<div class="container">

    <!-- 1 -->
    <div class="box box1">
        Relative
        <div class="abs abs1">Top Right</div>
    </div>

    <!-- 2 -->
    <div class="box box2">
        Relative
        <div class="abs abs2">Top Left</div>
    </div>

    <!-- 3 -->
    <div class="box box3">
        Relative
        <div class="abs abs3">Bottom Right</div>
    </div>

    <!-- 4 -->
    <div class="box box4">
        Relative
        <div class="abs abs4">Bottom Left</div>
    </div>

    <!-- 5 -->
    <div class="box box5">
        Relative
        <div class="abs abs5">Center</div>
    </div>

    <!-- 6 -->
    <div class="box box6">
        Relative
        <div class="circle"></div>
    </div>

    <!-- 7 -->
    <div class="box box7">
        Relative
        <div class="badge">99+</div>
    </div>

    <!-- 8 -->
    <div class="box box8">
        Relative
        <div class="ribbon">SALE</div>
    </div>

    <!-- 9 -->
    <div class="box box9">
        Relative
        <div class="avatar"></div>
    </div>

    <!-- 10 -->
    <div class="box box10">
        Relative
        <div class="button">+</div>
    </div>

    <!-- 11 -->
    <div class="box box11">
        Relative
        <div class="shadow"></div>
        <div class="card">Card</div>
    </div>

    <!-- 12 -->
    <div class="box box12">
        Relative
        <div class="one"></div>
        <div class="two"></div>
        <div class="three"></div>
    </div>

</div>

</section>

</body>
</html>
